<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
  <defs>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4c06a"/>
      <stop offset="100%" stop-color="#d98a26"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#20242c"/>
      <stop offset="100%" stop-color="#14161b"/>
    </linearGradient>
  </defs>

  <!-- fondo tipo ícono de app -->
  <rect x="2" y="2" width="116" height="116" rx="27" fill="url(#bgGrad)" stroke="#363b46" stroke-width="1.5"/>

  <!-- letra S, sólida y legible -->
  <text x="60" y="60"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="78"
        fill="url(#letterGrad)"
        text-anchor="middle"
        dominant-baseline="central">S</text>

  <!-- acento: play button, hace referencia a "reproductor" sin estorbar la letra -->
  <g transform="translate(84,84)">
    <circle r="12.5" fill="#14161b" stroke="#e8a33d" stroke-width="1.5"/>
    <path d="M -4 -6.5 L 6.5 0 L -4 6.5 Z" fill="#e8a33d"/>
  </g>
</svg>
